# fly.toml app configuration file generated for ai-catalog-mhmhiq on 2026-06-24T16:24:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-catalog-mhmhiq'
primary_region = 'jnb'

[build]

[[mounts]]
  source = 'catalog_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
